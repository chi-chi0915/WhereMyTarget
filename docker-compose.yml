services:
  # PostgreSQL: 논문 메타데이터와 chunk 정보를 저장하는 관계형 DB
  postgres:
    image: postgres:16
    container_name: wheremytarget-postgres

    # 컨테이너 최초 실행 시 생성할 DB 정보
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    # 내 PC의 5432 포트와 컨테이너 내부 PostgreSQL 5432 포트를 연결
    ports:
      - "5432:5432"

    # DB 데이터를 Docker volume에 저장해서 컨테이너를 껐다 켜도 유지
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Qdrant: 논문 chunk의 embedding vector를 저장하는 벡터 DB
  qdrant:
    image: qdrant/qdrant:latest
    container_name: wheremytarget-qdrant

    # 6333: HTTP API/Dashboard, 6334: gRPC API
    ports:
      - "6333:6333"
      - "6334:6334"

    # 벡터 데이터와 collection 정보를 유지
    volumes:
      - qdrant_data:/qdrant/storage

# Docker가 관리하는 영구 저장 공간
volumes:
  postgres_data:
  qdrant_data: